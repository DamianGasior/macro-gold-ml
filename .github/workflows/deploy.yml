name: Build and Deploy to Azure

# Odpala się tylko przy pushu na main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # GitHub odpala ten job na swoim Ubuntu VM

    steps:
      # Krok 1: pobierz kod z repo na runner VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Krok 2: zaloguj się do Docker Hub żeby móc pushować image
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Krok 3: zbuduj image i pushuj na Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: damgas712/gold-api:latest

      # Krok 4: zaloguj się do Azure używając service principal
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Krok 5: usuń stary kontener i stwórz nowy z nowym image
      - name: Redeploy ACI
        run: |
          az container delete \
            --resource-group gold-api-rg \
            --name gold-api-prediction-v2 \
            --yes

          az container create \
            --resource-group gold-api-rg \
            --name gold-api-prediction-v2 \
            --image damgas712/gold-api:latest \
            --registry-login-server index.docker.io \
            --registry-username ${{ secrets.DOCKERHUB_USERNAME }} \
            --registry-password ${{ secrets.DOCKERHUB_TOKEN }} \
            --ports 8000 \
            --dns-name-label gold-api-prediction-v2 \
            --location westeurope \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5 \
            --environment-variables \
                TWELVE_DATA_API_KEY=${{ secrets.TWELVE_DATA_API_KEY }} \
                FRED_API_KEY=${{ secrets.FRED_API_KEY }}
