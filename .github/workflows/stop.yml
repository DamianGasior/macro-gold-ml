name: Stop Azure Container

on:
    schedule:
    # - cron: '30 21 * * 1-5' 

jobs:
  stop-container:
    runs-on: ubuntu-latest
    
    steps: 
# Step 1 : Login to azure using the below account details
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
    
      - name: Stop ACI 
        run: |
          az container stop \
            --resource-group gold-api-rg \
            --name gold-api-prediction-v2