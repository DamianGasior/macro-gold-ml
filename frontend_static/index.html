<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Analysis Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #b8860b;
            text-align: center;
        }

        /* obszar wyświetlania wiadomości */
        #chat-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        /* bąbelek wiadomości użytkownika */
        .message-user {
            background: #b8860b;
            color: white;
            padding: 10px 14px;
            border-radius: 16px 16px 4px 16px;
            margin: 8px 0 8px auto;
            max-width: 70%;
            width: fit-content;
        }

        /* bąbelek odpowiedzi AI */
        .message-ai {
            background: #e8e8e8;
            color: #333;
            padding: 10px 14px;
            border-radius: 16px 16px 16px 4px;
            margin: 8px auto 8px 0;
            max-width: 70%;
            width: fit-content;
        }

        /* spinner "ładowanie..." */
        .loading {
            color: #999;
            font-style: italic;
            margin: 8px 0;
        }

        /* pole tekstowe na pytanie */
        #input-area {
            display: flex;
            gap: 8px;
        }

        #question {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
        }

        #send-btn {
            padding: 12px 24px;
            background-color: #b8860b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        #send-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>Gold Analysis Chat</h1>

    <div id="chat-box">
        <!-- Tekst startowy. Jesli /predict/gold odpowie, JS podmieni go na dzisiejszy sygnal.
             Jesli endpoint padnie - zostaje ten tekst, wiec dziala jako fallback. -->
        <div class="message-ai" id="greeting">
            Hello! I'm your gold analytics assistant. Ask me a question about gold, LGBM signal and general market situation.
        </div>
    </div>

    <div id="input-area">
        <textarea
            id="question"
            rows="2"
            placeholder="Ask the question about gold market .."
        ></textarea>
        <button id="send-btn" onclick="sendMessage()">Wyślij</button>
    </div>

    <script>
        // UUID sesji — null przy pierwszym pytaniu, potem zapisany z odpowiedzi API
        let sessionUuid = null;

        async function sendMessage() {
            const questionInput = document.getElementById('question');
            const question = questionInput.value.trim();

            // ignoruj puste wiadomości
            if (!question) return;

            // pokaż pytanie użytkownika w czacie
            addMessage(question, 'user');
            questionInput.value = '';

            // zablokuj przycisk podczas oczekiwania na odpowiedź
            const btn = document.getElementById('send-btn');
            btn.disabled = true;

            // pokaż "ładowanie..."
            const loadingEl = addLoading();

            try {
                // wyślij POST do /post/chat z pytaniem i UUID sesji
                const response = await fetch('/post/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        uuid: sessionUuid   // null = nowa sesja, string = kontynuacja
                    })
                });

                if (!response.ok) {
                    throw new Error(`Błąd serwera: ${response.status}`);
                }

                const data = await response.json();

                // zapisz UUID żeby kolejne pytania trafiały do tej samej sesji
                sessionUuid = data.uuid;

                // usuń "ładowanie..." i pokaż odpowiedź
                loadingEl.remove();
                addMessage(data.response, 'ai');

            } catch (error) {
                loadingEl.remove();
                addMessage(`Błąd: ${error.message}`, 'ai');
            }

            btn.disabled = false;
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'message-user' : 'message-ai';
            div.textContent = text;
            chatBox.appendChild(div);
            // przewiń na dół
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function addLoading() {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'loading';
            div.textContent = 'Analysing...';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        // Pobiera dzisiejszy sygnal modelu i pokazuje go zamiast statycznego powitania.
        // Uderza w /predict/gold - to GET, wiec bez body (inaczej niz POST /post/chat).
        async function loadRecommendation() {
            const greetingEl = document.getElementById('greeting');

            try {
                const response = await fetch('/predict/gold');

                if (!response.ok) {
                    throw new Error(`Błąd serwera: ${response.status}`);
                }

                // backend zwraca: {prediction: "long", probability: 0.7412}
                const data = await response.json();

                // "long" -> "LONG", "no_trade" -> "NO TRADE"
                const signal = data.prediction.toUpperCase().replace('_', ' ');
                // 0.7412 -> "74.1"
                const percent = (data.probability * 100).toFixed(1);

                greetingEl.textContent =
                    `Today's LGBM signal for gold: ${signal} (long probability ${percent}%). ` +
                    `Ask me about the macro fundamentals behind it, or about the model itself.`;

            } catch (error) {
                // Swiadomie nie ruszamy powitania - user widzi tekst z HTML zamiast bledu
                console.error('Nie udało się pobrać rekomendacji:', error);
            }
        }

        // DOMContentLoaded = przegladarka skonczyla budowac strone.
        // Ten listener odpala sie raz, automatycznie - w odroznieniu od 'keydown' nizej,
        // ktory czeka na akcje uzytkownika.
        document.addEventListener('DOMContentLoaded', loadRecommendation);

        // wyślij pytanie klawiszem Enter (Shift+Enter = nowa linia)
        document.getElementById('question').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
